site_name: agent-policy
site_description: Schema-first generator for coding-agent repo policies and compatibility files.
site_url: https://cameronbrooks11.github.io/agent-policy/
repo_url: https://github.com/CameronBrooks11/agent-policy
repo_name: CameronBrooks11/agent-policy
copyright: Copyright &copy; 2026 Cameron Brooks — Apache-2.0

docs_dir: docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Schema Reference: schema-reference.md
  - Targets:
    - compatibility-matrix.md
    - reference/targets/agents-md.md
    - reference/targets/claude-md.md
    - reference/targets/cursor-rules.md
  - Design:
    - vision.md
    - architecture.md
    - decisions.md
  - Roadmap: roadmap.md
  - Contributing: contributing.md
